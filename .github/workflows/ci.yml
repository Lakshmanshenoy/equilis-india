name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: 'Run RELIANCE live-fetch smoke test'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '30 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python dependency consistency
        run: python -m pip check

      - name: Install Node dependencies
        run: npm ci

      - name: Audit npm dependencies (high severity)
        run: npm audit --audit-level=high

      - name: Run Python tests
        run: pytest -q

      - name: Validate CLI wiring
        run: npm run validate

  live-smoke:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_live_smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run RELIANCE live smoke
        env:
          EQUILIS_ENABLE_LIVE_SMOKE: '1'
        run: pytest -q tests/test_live_smoke.py -m live_smoke
